{% extends "base.html" %}

{% block title %}Inscription{% endblock %}

{% block content %}
    <h1 class="mb-4">Inscription</h1>
    <form method="POST">
        <div class="form-group">
            <label for="username">Nom d'utilisateur</label>
            <input type="text" class="form-control" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <div class="form-group">
            <label for="role">Rôle (admin/user)</label>
            <input type="text" class="form-control" id="role" name="role" value="user">
            <small class="form-text text-muted">TODO SECURITY: Un utilisateur peut s'enregistrer en tant qu'admin.</small>
        </div>
        <button type="submit" class="btn btn-primary">S'inscrire</button>
    </form>
{% endblock %}
