{% extends "base.html" %}

{% block title %}Debug Output{% endblock %}

{% block content %}

    <div class="card">
        <div class="card-body">
            <pre>{{ output }}</pre>
        </div>
    </div>
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary mt-3">Retour au Tableau de Bord</a>
{% endblock %}
