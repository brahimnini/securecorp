{% extends "base.html" %}

{% block title %}Profil Utilisateur{% endblock %}

{% block content %}
    <h1 class="mb-4">Profil de {{ user.username }}</h1>
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Informations du profil</h5>
            <p class="card-text"><strong>ID:</strong> {{ user.id }}</p>
            <p class="card-text"><strong>Nom d\'utilisateur:</strong> {{ user.username }}</p>
            <p class="card-text"><strong>Email:</strong> {{ user.email }}</p>
            <p class="card-text"><strong>Rôle:</strong> {{ user.role }}</p>
            <a href="{{ url_for('users.edit_profile') }}" class="btn btn-primary">Modifier le profil</a>
        </div>
    </div>
{% endblock %}
